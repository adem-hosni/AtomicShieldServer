{% extends "unfold/admin/base.html" %}

{% block content %}
    <div class="space-y-4">
        <div class="bg-white p-6 rounded-lg shadow">
            <h2 class="text-xl font-semibold">API Version Management</h2>
            <p class="text-gray-600">Manage valid and current versions used in your application.</p>
        </div>

        <div class="bg-white p-6 rounded-lg shadow">
            <h3 class="text-lg font-semibold">Current Version</h3>
            <p class="text-blue-500 text-2xl">{{ current_version }}</p>
        </div>

        <div class="bg-white p-6 rounded-lg shadow">
            <h3 class="text-lg font-semibold">Valid Versions</h3>
            <ul class="list-disc pl-5">
                {% for version in valid_versions %}
                    <li class="text-green-600">{{ version }}</li>
                {% endfor %}
            </ul>
        </div>
    </div>
{% endblock %}
